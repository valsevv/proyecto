spring.application.name=proyect
spring.datasource.url=jdbc:postgresql://localhost:5432/proyect
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.web.resources.static-locations=file:front/

# Static resource caching - cache for 7 days (604800 seconds)
spring.web.resources.cache.cachecontrol.max-age=7d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.must-revalidate=true

# JWT Configuration
jwt.secret=d8aF92ksLmPq78XzRtUvW1yB6nHjK3sQ
jwt.expiration=3600000

# spring.jpa.hibernate.ddl-auto=update   esto se quita para crear las tablas a mano
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.example.proyect=DEBUG

# Game configuration
game.actions-per-turn=15
game.aerial-attack-fuel-cost=2
game.carrier-hits-to-destroy=5

# Missile configuration
game.missile.max-distance=15
# Deprecated: drone damage is controlled by game.units.drone.attack-damage

# Unit balance configurable by faction
# Aereo
game.units.aereo.max-hp=1
game.units.aereo.movement-range=3
game.units.aereo.max-fuel=14
game.units.aereo.vision-range=6
game.units.aereo.ammo=1
game.units.aereo.accuracy=0.70
game.units.aereo.carrier-hp=6
game.units.aereo.carrier-movement-range=4
game.units.aereo.carrier-vision-range=6

# Naval
game.units.naval.max-hp=1
