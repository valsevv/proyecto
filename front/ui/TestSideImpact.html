<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SideImpactView Test</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
<style>
    body { margin: 0; background: #111; }
</style>
</head>
<body>

<script>
class SideImpactView {
    constructor(scene, x, y, width = 400, height = 260) {
        this.scene = scene;
        this.width = width;
        this.height = height;
        this.groundY = 40;

        this.container = scene.add.container(x, y);
        this.container.setDepth(2000);

        this.bg = scene.add.rectangle(0, 0, width, height, 0x1e1e1e)
            .setStrokeStyle(4, 0x888888);
        this.container.add(this.bg);

        this.content = scene.add.container(0, 0);
        this.container.add(this.content);

        this._attackKind = null;
    }

    onAttackStart({ kind = 'missile', travelMs = 1500 }) {
        this._attackKind = kind;
        this.content.removeAll(true);

        const leftX = -this.width / 4;
        const rightX = this.width / 4;
        const attackerY = -60;
        const targetY = this.groundY;

        const attacker = this.scene.add.rectangle(leftX, attackerY, 40, 40, 0x00ffcc);
        const target = this.scene.add.rectangle(rightX, targetY, 40, 40, 0xff4444);
        const projectile = this.scene.add.circle(leftX, attackerY, 8, 0xffffff);

        this.content.add([attacker, target, projectile]);

        this.scene.tweens.add({
            targets: projectile,
            x: rightX,
            y: targetY,
            duration: travelMs,
            ease: 'Linear',
            onComplete: () => this.onImpact(rightX, targetY)
        });
    }

    onImpact(x, y) {
        const explosion = this.scene.add.circle(x, y, 30, 0xffff00);
        this.content.add(explosion);

        this.scene.tweens.add({
            targets: explosion,
            scale: 2,
            alpha: 0,
            duration: 800,
            onComplete: () => explosion.destroy()
        });
    }
}

class TestScene extends Phaser.Scene {
    constructor() {
        super('TestScene');
    }

    create() {
        this.view = new SideImpactView(this, 400, 300);

        this.input.keyboard.on('keydown-SPACE', () => {
            this.view.onAttackStart({
                kind: 'missile',
                travelMs: 1500
            });
        });
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#000000',
    scene: [TestScene]
});
</script>

</body>
</html>
